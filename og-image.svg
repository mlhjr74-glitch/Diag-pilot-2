<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e17"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e2535" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e2535" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e2535" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e2535" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topGrad)"/>

  <!-- Left content area -->
  <!-- Badge -->
  <rect x="80" y="100" width="220" height="36" rx="18" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <circle cx="104" cy="118" r="5" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="118" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#22d3ee">AI Car Diagnostics</text>

  <!-- Title: DiagPilot -->
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" letter-spacing="-3" fill="#f1f5f9">Diag</text>
  <text x="271" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" letter-spacing="-3" fill="#22d3ee">Pilot</text>

  <!-- Subtitle -->
  <text x="80" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">Professional Car Diagnostics</text>

  <!-- Price pill -->
  <rect x="80" y="300" width="180" height="44" rx="22" fill="url(#pricePillGrad)"/>
  <text x="170" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0a0e17">$9.99/month</text>

  <!-- Feature bullets -->
  <circle cx="92" cy="390" r="4" fill="#22d3ee"/>
  <text x="110" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">AI-guided diagnostic flowcharts</text>

  <circle cx="92" cy="430" r="4" fill="#22d3ee"/>
  <text x="110" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">Built by an ASE Master Technician</text>

  <circle cx="92" cy="470" r="4" fill="#f97316"/>
  <text x="110" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8">Live mechanic video when you need it</text>

  <!-- Right side: diagnostic card mockup -->
  <rect x="720" y="80" width="400" height="470" rx="16" fill="#111827" stroke="rgba(148,163,184,0.1)" stroke-width="1"/>
  <!-- Top glow line on card -->
  <rect x="770" y="79" width="300" height="2" fill="url(#cardTopGrad)"/>

  <!-- Card header -->
  <circle cx="748" cy="112" r="6" fill="#ef4444"/>
  <circle cx="768" cy="112" r="6" fill="#eab308"/>
  <circle cx="788" cy="112" r="6" fill="#22c55e"/>
  <text x="812" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">2019 Honda Civic · No Start</text>

  <!-- Step 1 -->
  <rect x="740" y="140" width="360" height="68" rx="8" fill="rgba(34,211,238,0.05)" stroke="none"/>
  <rect x="740" y="140" width="3" height="68" rx="1.5" fill="#22d3ee" opacity="0.4"/>
  <text x="756" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">STEP 1</text>
  <text x="756" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0">Check battery voltage at terminals</text>
  <text x="756" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">with multimeter</text>

  <!-- Step 2 (active) -->
  <rect x="740" y="224" width="360" height="88" rx="8" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <rect x="740" y="224" width="3" height="88" rx="1.5" fill="#22d3ee"/>
  <text x="756" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22d3ee" letter-spacing="0.5">STEP 2 · YOUR INPUT</text>
  <text x="756" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#e2e8f0">Did you get 12.4V or higher?</text>
  <!-- Input box -->
  <rect x="756" y="278" width="120" height="28" rx="6" fill="rgba(0,0,0,0.4)" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
  <text x="768" y="297" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#22d3ee">12.6V |</text>

  <!-- Step 3 -->
  <rect x="740" y="328" width="360" height="68" rx="8" fill="rgba(34,211,238,0.05)" stroke="none"/>
  <rect x="740" y="328" width="3" height="68" rx="1.5" fill="#22d3ee" opacity="0.4"/>
  <text x="756" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">STEP 3</text>
  <text x="756" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">Good. Check power at starter</text>
  <text x="756" y="386" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">solenoid terminal...</text>

  <!-- Tech status at bottom of card -->
  <rect x="740" y="420" width="360" height="108" rx="8" fill="rgba(0,0,0,0.2)"/>
  <text x="756" y="444" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.5">CERTIFIED TECHS · LIVE</text>

  <circle cx="767" cy="468" r="14" fill="url(#avatarGrad1)"/>
  <text x="767" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="white">MR</text>
  <circle cx="767" cy="493" r="5" fill="#22c55e" stroke="#111827" stroke-width="1.5"/>
  <text x="786" y="466" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#f1f5f9">Mike R.</text>
  <text x="786" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">ASE Certified · 12yr</text>
  <rect x="870" y="458" width="46" height="20" rx="10" fill="rgba(34,197,94,0.15)"/>
  <text x="893" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#22c55e">Online</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="topGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pricePillGrad" x1="80" y1="300" x2="260" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cardTopGrad" x1="770" y1="0" x2="1070" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="avatarGrad1" x1="753" y1="454" x2="781" y2="482" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
</svg>
